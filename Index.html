<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KASIR PENJUALAN</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/9/98/Kota_Samarinda.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      lebar: 100%;
      tinggi: 100%;
      warna latar belakang: #eee;
      meluap: tersembunyi; /* Kemungkinan gulir ganda */
    }

    .iframe-container {
      lebar: 100%;
      tinggi: 100dvh; /* Menggunakan dvh agar pas di browser seluler */
      overflow: tersembunyi;
    }

    iframe {
      tampilkan: blok;
      lebar: 100%;
      tinggi: 100%;
      batas: tidak ada;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="aplikasi"
      src="https://script.google.com/macros/s/AKfycbyTohUrM1xqp4S66b6BGQlCs_iwHmIKFGyZFFH8Uq7OBxzhjb46D_FyitnE4tFso58m/exec"
      scrolling="ya"
      izinkanlayar penuh="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      izinkan="layar penuh; kamera; mikrofon; pengambilan gambar; geolokasi;">
    </iframe>
  </div>
</body>
</html>
